<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Books Catalogue</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: #f5f5f5;
      color: #222;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    button {
      background: #1f6f8b;
      color: white;
      border: none;
      padding: 10px 16px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    button:hover {
      background: #15576c;
    }
    #book-list {
      width: 320px;
      border: 1px solid #999;
      background: #e9e9e9;
      padding: 10px;
      min-height: 120px;
      margin-bottom: 25px;
    }
    .book-item {
      padding: 6px 4px;
      cursor: pointer;
    }
    .book-item:hover {
      background: #d8d8d8;
    }
    #book-details {
      width: 420px;
      border: 1px solid #999;
      background: white;
      padding: 15px;
      min-height: 180px;
    }
    .label {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Books Catalogue</h1>

  <p>Click the button below to get all books items from the server:</p>
  <button id="fetchBooksBtn">Get all books</button>

  <div id="book-list"></div>

  <div id="book-details">
    <p><span class="label">Title:</span> </p>
    <p><span class="label">Author:</span> </p>
    <p><span class="label">Year:</span> </p>
    <p><span class="label">Genre:</span> </p>
    <p><span class="label">Summary:</span> </p>
    <p><span class="label">Price (AUD):</span> </p>
  </div>

  <script>
    const fetchBtn = document.getElementById('fetchBooksBtn');
    const bookList = document.getElementById('book-list');
    const bookDetails = document.getElementById('book-details');

    function renderBookDetails(book) {
      bookDetails.innerHTML = `
        <p><span class="label">Title:</span> ${book.title}</p>
        <p><span class="label">Author:</span> ${book.author}</p>
        <p><span class="label">Year:</span> ${book.year}</p>
        <p><span class="label">Genre:</span> ${book.genre}</p>
        <p><span class="label">Summary:</span> ${book.summary}</p>
        <p><span class="label">Price (AUD):</span> ${book.price}</p>
      `;
    }

    function fetchBookById(id) {
      fetch(`/api/books/${id}`)
        .then(res => res.json())
        .then(result => {
          renderBookDetails(result.data);
        })
        .catch(err => {
          console.error('Error fetching book details:', err);
        });
    }

    function renderBookList(books) {
      bookList.innerHTML = '';

      books.forEach(book => {
        const item = document.createElement('div');
        item.className = 'book-item';
        item.textContent = `${book.title} ${book.price} AUD`;
        item.addEventListener('click', () => fetchBookById(book.id));
        bookList.appendChild(item);
      });
    }

    fetchBtn.addEventListener('click', () => {
      fetch('/api/books')
        .then(res => res.json())
        .then(result => {
          renderBookList(result.data);
        })
        .catch(err => {
          console.error('Error fetching books:', err);
        });
    });
  </script>
</body>
</html>
